<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookmark Manager</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔖</text></svg>">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="container">
    <header class="hero">
      <p class="eyebrow">Neural Vault</p>
      <h1>Future Bookmarks</h1>
      <p class="subtitle">Collect, tag, and launch your favorite links from a sleek command-center interface.</p>
    </header>

    <form id="bookmark-form">
      <input type="text" id="title" placeholder="Title (e.g. GitHub)" required>
      <input type="url" id="url" placeholder="URL (e.g. https://github.com)" required>
      <input type="text" id="tag" placeholder="Tag (e.g. work, learning)">
      <button type="submit">Add to Vault</button>
    </form>

    <div id="tags-filter" class="tags-filter"></div>

    <div id="bookmarks-list" class="bookmarks-list"></div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
